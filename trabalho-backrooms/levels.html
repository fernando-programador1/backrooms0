    .card {
        width: 190px;
        height: 300px;
        background: white;
        padding: .4em;
        border-radius: 6px;
    }

    .card-image {
    background-color: rgb(236, 236, 236);
    height: 130px;
    border-radius: 6px 6px 0 0;
    }

    .card-image img
    {
    width: 100%;
    height: 100%;
    object-fit: cover;
}



    .card h1{
    font-size: 15px;
    padding-top: 10px;
    }

    .card-image:hover {
    transform: scale(0.98);
    }

    .category {
    text-transform: uppercase;
    font-size: 0.7em;
    font-weight: 600;
    color: rgb(63, 121, 230);
    padding: 10px 7px 0;
    }

    .category:hover {
    cursor: pointer;
    }

    .heading {
    font-weight: 600;
    color: rgb(88, 87, 87);
    padding: 7px;
    }

    .heading img {
    width: 100%;
    height: auto;
    display: block;  
    margin-bottom: 5px;
}


    .heading:hover {
    cursor: pointer;
    }

    .name {
    font-weight: 600;
    }

    .name:hover {
    cursor: pointer;
    }

    .container2{
        padding: 10px;
    }

    .containerp {
